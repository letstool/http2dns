name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: http2dns-linux-amd64
            binary: http2dns

          - goos: linux
            goarch: arm64
            artifact: http2dns-linux-arm64
            binary: http2dns

          - goos: windows
            goarch: amd64
            artifact: http2dns-windows-amd64
            binary: http2dns.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-extldflags -static -s -w -X main.version=${{ github.ref_name }}" \
            -tags netgo \
            -o out/${{ matrix.binary }} \
            ./cmd/http2dns

      - name: Archive binary
        run: |
          cd out
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}.tar.gz
          retention-days: 1

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
